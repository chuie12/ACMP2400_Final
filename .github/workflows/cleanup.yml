name: Terraform Cleanup

on:
  workflow_dispatch:

jobs:
  destroy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 #v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd #v3

      - name: Terraform Init Main
        working-directory: ./terraform
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          STATE_KEY: ${{ secrets.ARM_ACCESS_KEY }}
        run: terraform init -input=false

      - name: Terraform Destroy Main
        working-directory: ./terraform
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          STATE_KEY: ${{ secrets.ARM_ACCESS_KEY }}
        run: |
          terraform destroy -auto-approve \
          -input=false \
          -var="django_secret_key=${{ secrets.DJANGO_SECRET_KEY }}" \
          -var="image_tag=${{ github.sha }}"

      - name: Terraform Init Registry
        working-directory: ./terraform_init
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          STATE_KEY: ${{ secrets.ARM_ACCESS_KEY }}
        run: terraform init -input=false

      - name: Terraform Destroy Registry
        working-directory: ./terraform_init
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          STATE_KEY: ${{ secrets.ARM_ACCESS_KEY }}
        run: terraform destroy -auto-approve -input=false

      - name: Azure Login
        uses: azure/login@8c334a195cbb38e46038007b304988d888bf676a #v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Delete ACR Images
        run: |
          az acr repository delete \
            --name acrchuieacmp2400 \
            --repository my-app \
            --yes
