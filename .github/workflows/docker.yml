name: Docker Build Test

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Build Docker image
        run: docker build -t my-app .

      - name: Run container
        run: docker run -d --name my-app-test -p 8000:8000 -e DJANGO_SECRET_KEY=${{secrets.DJANGO_SECRET_KEY}} my-app

      - name: Wait until app responds
        run: |
          for i in {1..15}; do
            if curl --fail http://127.0.0.1:8000; then
              exit 0
            fi
            echo "Still waiting..."
            sleep 2
          done
          echo "App never came up"
          docker ps -a
          docker logs my-app-test
          exit 1
